# Production deployment — pulls pre-built image from GitHub Container Registry
# Usage: docker compose -f docker-compose.prod.yml up -d
# Update: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: ghcr.io/solfins-dev/3dx-gateway:latest
    container_name: 3dx-gateway-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__BomExplorer: "Host=postgres;Port=5432;Database=bom_explorer;Username=bomapp;Password=${POSTGRES_PASSWORD:-BomExplorer2026!}"
      # Updates__CheckUrl is read from appsettings.json (or set via env var per
      # docs/wiki/reference/update-manifest.md). Public manifest — no token.
    volumes:
      - app_data:/app/data
      - ./license.lic:/app/license.lic
      # The host-side updater helper socket is NOT mounted here by default
      # because Docker auto-creates an empty directory at the source path when
      # the source doesn't exist, which would block a later helper install.
      # To enable click-to-apply backend updates, run install-helper.sh on the
      # host (it writes docker-compose.helper.yml), then layer that overlay:
      #   docker compose -f docker-compose.prod.yml -f docker-compose.helper.yml up -d
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/license/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: 3dx-gateway-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: bom_explorer
      POSTGRES_USER: bomapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-BomExplorer2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomapp -d bom_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  app_data:
